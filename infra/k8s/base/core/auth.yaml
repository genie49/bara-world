apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: bara/auth:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://mongodb.data.svc.cluster.local:27017/bara-auth"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis.data.svc.cluster.local"
            - name: BARA_AUTH_JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: BARA_AUTH_JWT_PRIVATE_KEY
            - name: BARA_AUTH_JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: BARA_AUTH_JWT_PUBLIC_KEY
            - name: BARA_AUTH_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: BARA_AUTH_GOOGLE_CLIENT_ID
            - name: BARA_AUTH_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: BARA_AUTH_GOOGLE_CLIENT_SECRET
            - name: BARA_AUTH_GOOGLE_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: BARA_AUTH_GOOGLE_REDIRECT_URI
            - name: APP_VERSION
              value: "local"
            - name: SERVICE_NAME
              value: "bara-auth"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: core
spec:
  selector:
    app: auth
  ports:
    - port: 8081
      targetPort: 8081
---
# Secret은 .env 파일에서 자동 생성된다.
# 로컬: scripts/k8s.sh → --from-env-file=.env
# CI/CD: deploy.yml → --from-env-file=.env.prod (GCP Parameter Manager에서 pull)
# 모든 환경변수(redirect URI 포함)는 .env / .env.prod에서 관리
