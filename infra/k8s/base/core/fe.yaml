apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
        - name: fe
          image: bara/fe:latest
          ports:
            - containerPort: 5173
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: core
spec:
  selector:
    app: fe
  ports:
    - port: 5173
      targetPort: 5173
