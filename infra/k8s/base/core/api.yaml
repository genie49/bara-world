apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: bara/api:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: 'mongodb://mongodb.data.svc.cluster.local:27017/bara'
            - name: APP_VERSION
              value: 'local'
            - name: SERVICE_NAME
              value: 'bara-api'
          readinessProbe:
            httpGet:
              path: /api/core/actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/core/actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: core
spec:
  selector:
    app: api
  ports:
    - port: 8082
      targetPort: 8082
