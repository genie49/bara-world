upstream fe {
    server fe.core.svc.cluster.local:5173;
}

upstream auth {
    server auth.core.svc.cluster.local:8081;
}

server {
    listen 80;

    # FE 콜백 (auth 서비스가 JWT 발급 후 여기로 redirect)
    location = /auth/callback {
        proxy_pass http://fe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth API (OAuth 로그인/콜백 등)
    location /auth/ {
        proxy_pass http://auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # FE (SPA)
    location / {
        proxy_pass http://fe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
