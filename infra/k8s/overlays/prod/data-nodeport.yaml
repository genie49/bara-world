apiVersion: v1
kind: Service
metadata:
  name: mongodb-external
  namespace: data
spec:
  type: NodePort
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 30017
---
apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: data
spec:
  type: NodePort
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 30379
