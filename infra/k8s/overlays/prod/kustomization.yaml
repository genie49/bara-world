apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: bara/auth
    newName: asia-northeast3-docker.pkg.dev/bara-world/bara/auth
    newTag: latest
  - name: bara/fe
    newName: asia-northeast3-docker.pkg.dev/bara-world/bara/fe
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: auth
      namespace: core
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: registry-credentials
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: APP_ENVIRONMENT
          value: "prod"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SPRING_PROFILES_ACTIVE
          value: "prod"
      - op: test
        path: /spec/template/spec/containers/0/env/0/name
        value: SPRING_DATA_MONGODB_URI
      - op: replace
        path: /spec/template/spec/containers/0/env/0
        value:
          name: SPRING_DATA_MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: SPRING_DATA_MONGODB_URI
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: REDIS_PASSWORD
  - target:
      kind: Deployment
      name: fe
      namespace: core
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: registry-credentials
  - target:
      kind: StatefulSet
      name: mongodb
      namespace: data
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: data-secrets
                key: MONGO_ROOT_USERNAME
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: data-secrets
                key: MONGO_ROOT_PASSWORD
  - target:
      kind: Deployment
      name: redis
      namespace: data
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: data-secrets
                key: REDIS_PASSWORD
      - op: add
        path: /spec/template/spec/containers/0/args
        value:
          - "--requirepass"
          - "$(REDIS_PASSWORD)"
