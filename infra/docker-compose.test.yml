services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      CLUSTER_ID: bara-test-cluster-001

  auth:
    image: bara/auth:latest
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/bara-auth-test
      SPRING_DATA_REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: test
      BARA_AUTH_JWT_PRIVATE_KEY: ${BARA_AUTH_JWT_PRIVATE_KEY}
      BARA_AUTH_JWT_PUBLIC_KEY: ${BARA_AUTH_JWT_PUBLIC_KEY}
      BARA_AUTH_GOOGLE_CLIENT_ID: ${BARA_AUTH_GOOGLE_CLIENT_ID}
      BARA_AUTH_GOOGLE_CLIENT_SECRET: ${BARA_AUTH_GOOGLE_CLIENT_SECRET}
      BARA_AUTH_GOOGLE_REDIRECT_URI: ${BARA_AUTH_GOOGLE_REDIRECT_URI:-http://localhost/auth/google/callback}
    depends_on:
      - mongodb
      - redis
      - kafka

  fe:
    image: bara/fe:latest
    depends_on:
      - auth

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fe
      - auth
