name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: asia-northeast3-docker.pkg.dev
  REPOSITORY: bara-world/bara

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      fe: ${{ steps.filter.outputs.fe }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            auth:
              - 'apps/auth/**'
              - 'libs/**'
              - 'build-logic/**'
              - 'gradle/**'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - '.github/workflows/**'
              - 'infra/k8s/**'
            fe:
              - 'apps/fe/**'
              - '.github/workflows/**'
              - 'infra/k8s/**'

  build-push-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-24.04-arm
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push auth
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/auth/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/auth:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-fe:
    needs: detect-changes
    if: needs.detect-changes.outputs.fe == 'true'
    runs-on: ubuntu-24.04-arm
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push fe
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/fe/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/fe:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/fe:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [detect-changes, build-push-auth, build-push-fe]
    if: always() && (needs.build-push-auth.result == 'success' || needs.build-push-fe.result == 'success')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.VM_HOST }}"

      - name: Transfer manifests to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "infra/k8s/"
          target: "~/deploy"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          AUTH_CHANGED: ${{ needs.detect-changes.outputs.auth }}
          FE_CHANGED: ${{ needs.detect-changes.outputs.fe }}
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: asia-northeast3-docker.pkg.dev
          REPOSITORY: bara-world/bara
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: AUTH_CHANGED,FE_CHANGED,IMAGE_TAG,REGISTRY,REPOSITORY
          script: |
            set -euo pipefail

            # 1. imagePullSecret 갱신 (K8s 네이티브, K3s 재시작 불필요)
            TOKEN=$(gcloud auth print-access-token)
            kubectl create namespace core --dry-run=client -o yaml | kubectl apply -f -
            kubectl delete secret registry-credentials -n core --ignore-not-found
            kubectl create secret docker-registry registry-credentials -n core \
              --docker-server=asia-northeast3-docker.pkg.dev \
              --docker-username=oauth2accesstoken \
              --docker-password="$TOKEN"

            # 2. Traefik Gateway API 설정 (K3s manifests 디렉토리에 배치)
            sudo cp ~/deploy/infra/k8s/base/gateway/traefik-config.yaml \
              /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
            sleep 10

            # 3. 매니페스트 동기화 (레포의 prod overlay 그대로 적용)
            cd ~/deploy/infra/k8s
            kubectl apply -k overlays/prod/

            # 3. Parameter Manager에서 시크릿 pull + K8s Secret 갱신
            LATEST=$(gcloud parametermanager parameters versions list \
              --parameter=bara-env-prod --location=global \
              --sort-by=createTime --format="value(name)" | tail -1)
            VERSION_ID=$(basename "$LATEST")
            gcloud parametermanager parameters versions describe "$VERSION_ID" \
              --parameter=bara-env-prod --location=global \
              --format="value(payload.data)" | base64 -d > /tmp/.env.prod

            kubectl delete secret auth-secrets -n core --ignore-not-found
            kubectl create secret generic auth-secrets -n core \
              --from-env-file=/tmp/.env.prod
            rm -f /tmp/.env.prod

            # 4. 변경된 서비스만 이미지 업데이트
            if [ "$AUTH_CHANGED" = "true" ]; then
              kubectl set image deployment/auth -n core \
                auth=$REGISTRY/$REPOSITORY/auth:$IMAGE_TAG
              kubectl set env deployment/auth -n core \
                APP_VERSION=$IMAGE_TAG
            fi
            if [ "$FE_CHANGED" = "true" ]; then
              kubectl set image deployment/fe -n core \
                fe=$REGISTRY/$REPOSITORY/fe:$IMAGE_TAG
            fi

            # 5. 변경된 서비스만 rollout 대기
            if [ "$AUTH_CHANGED" = "true" ]; then
              kubectl rollout status deployment/auth -n core --timeout=180s
            fi
            if [ "$FE_CHANGED" = "true" ]; then
              kubectl rollout status deployment/fe -n core --timeout=180s
            fi

            # 정리
            rm -rf ~/deploy

            echo "Deploy complete"
