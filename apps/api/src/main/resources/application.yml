spring:
  application:
    name: bara-api
  data:
    mongodb:
      uri: mongodb://localhost:27017/bara
      auto-index-creation: true
    redis:
      host: redis.data.svc.cluster.local
      port: 6379
  kafka:
    bootstrap-servers: kafka-0.kafka.data.svc.cluster.local:9092
    producer:
      acks: all
      delivery-timeout-ms: 5000
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: api-service-results
      enable-auto-commit: false
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual

server:
  port: 8082
  servlet:
    context-path: /api/core

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

bara:
  openapi:
    title: Bara API
    version: 1.0.0
    description: 'Agent Registry & A2A Gateway API'
  api:
    task:
      block-timeout-seconds: 30
      kafka-publish-timeout-seconds: 5
      stream-grace-period-seconds: 60
      mongo-ttl-days: 7
      emitter-timeout-ms: 1800000 # 30분
      heartbeat-interval-ms: 15000 # 15초
