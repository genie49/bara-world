spring:
  application:
    name: bara-api
  data:
    mongodb:
      uri: mongodb://localhost:27017/bara
    redis:
      host: redis.data.svc.cluster.local
      port: 6379
  kafka:
    bootstrap-servers: kafka-0.kafka.data.svc.cluster.local:9092
    consumer:
      group-id: api-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8082
  servlet:
    context-path: /api/core

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

bara:
  openapi:
    title: Bara API
    version: 1.0.0
    description: "Agent Registry & A2A Gateway API"
